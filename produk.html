<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Katalog Produk - Adidas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">
            <img src="LOGO.png" alt="Logo Adidas" width="50px">
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="produk.html">Produk</a>
            <a href="login.html">Login</a>
        </nav>
    </header>

    <section>
        <h2>Daftar Stok Produk</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nama Produk</th>
                    <th>Kategori</th>
                    <th>Harga</th>
                    <th>Stok</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>001</td>
                    <td>Ultraboost Light</td>
                    <td>Running</td>
                    <td>Rp 3.000.000</td>
                    <td>15</td>
                </tr>
                <tr>
                    <td>002</td>
                    <td>Adicolor Hoodie</td>
                    <td>Lifestyle</td>
                    <td>Rp 1.200.000</td>
                    <td>20</td>
                </tr>
            </tbody>
        </table>
    </section>

    <section>
        <hr>
        <br>
        <h2>Tambah Pesanan Baru</h2>
        <form>
            <label>Nama Lengkap</label>
            <input type="text" name="nama" required>
            
            <label>Pilih Produk</label>
            <select name="produk">
                <option value="samba">Samba OG</option>
                <option value="ultraboost">Ultraboost</option>
                <option value="hoodie">Hoodie</option>
            </select>

            <label>Jumlah</label>
            <input type="number" name="jumlah" min="1" required>

            <button type="submit">Kirim Pesanan</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 UTS Project - Perusahaan Lifestyle</p>
    </footer>

</body>
</html>
